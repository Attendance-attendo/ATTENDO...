<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Attendo | Debug Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #dc2626; --gold: #facc15; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .card { background: var(--card); border-radius: 28px; width: 100%; max-width: 420px; padding: 1.8rem; box-shadow: 0 25px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; text-align: center; }
        input, select, button { width: 100%; padding: 13px; margin: 6px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: #0f172a; color: white; outline: none; }
        button { background: var(--red); border: none; cursor: pointer; font-weight: 800; }
        .hidden { display: none !important; }
        #debug-console { width: 100%; max-width: 400px; background: #000; color: #0f0; font-family: monospace; font-size: 10px; padding: 10px; border-radius: 8px; border: 1px solid #333; margin: 10px 0; text-align: left; overflow-wrap: break-word; }
        .brand-box h1 { margin: 0; font-size: 3.2rem; font-weight: 900; letter-spacing: -4px; color: var(--gold); text-align: center; }
    </style>
</head>
<body onload="initApp()">
    <div class="brand-box">
        <h1>ATTENDO</h1>
        <p style="color:var(--gold); font-size:10px; margin-top:5px; text-align:center; font-weight:700;">SYSTEM STATUS CHECK</p>
    </div>

    <div id="debug-console">Initializing System...</div>

    <div id="auth-card" class="card hidden">
        <input type="text" id="l-email" placeholder="Email Address">
        <input type="password" id="l-pass" placeholder="Password">
        <button onclick="login()">SIGN IN</button>
    </div>

    <div id="main-ui" class="hidden" style="width:100%; max-width:420px;">
        <div class="card">
            <p style="color:var(--gold)">System Active</p>
            <button onclick="logout()" style="background:#444">LOGOUT</button>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxWRCxvxsAUdVS__m0_Db7cGtj7fkZ-6RHhMcfMDtiV-vxkYX-6MyV57L3k03Ys75LMBA/exec";
        const ADMIN = "yuvansood1234@gmail.com";

        function log(msg, color="#0f0") {
            const console = document.getElementById('debug-console');
            console.innerHTML += `<div style="color:${color}">> ${msg}</div>`;
            console.scrollTop = console.scrollHeight;
        }

        async function initApp() {
            log("Checking browser session...");
            const u = sessionStorage.getItem('u_email');
            
            log("Testing connection to Google Script...");
            try {
                const response = await fetch(`${API}?action=getRoster`);
                if (response.ok) {
                    log("Connection Successful (200 OK)");
                    document.getElementById('debug-console').classList.add('hidden'); // Hide console if OK
                } else {
                    log(`Connection Error: ${response.status}`, "red");
                }
            } catch (e) {
                log(`FATAL ERROR: Failed to reach Google Script.`, "red");
                log(`REASON: ${e.message}`, "#ff0000");
                log(`ACTION: Ensure Deployment is set to 'Anyone'.`, "#aaa");
            }

            if(!u) {
                log("No session found. Showing Login Card.");
                document.getElementById('auth-card').classList.remove('hidden');
            } else {
                log(`Session found for: ${u}`);
                document.getElementById('main-ui').classList.remove('hidden');
            }
        }

        async function login() {
            const e = document.getElementById('l-email').value.toLowerCase().trim();
            const p = document.getElementById('l-pass').value.trim();
            log(`Attempting login for ${e}...`);

            try {
                const res = await fetch(`${API}?action=login&email=${e}&pass=${p}`);
                const status = await res.text();
                log(`Server Response: ${status}`);
                if(status.trim() === "valid") {
                    sessionStorage.setItem('u_email', e);
                    location.reload();
                } else {
                    log("Login Rejected by Server", "red");
                }
            } catch(err) {
                log("Fetch Error during login: " + err.message, "red");
            }
        }

        function logout() { sessionStorage.clear(); location.reload(); }
    </script>
</body>
</html>
