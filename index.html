<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Attendo Pro | Full Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #dc2626; --gold: #facc15; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .top-nav { width: 100%; max-width: 420px; display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; }
        .logout-btn { color: var(--red); font-weight: 800; cursor: pointer; border: 1.5px solid var(--red); padding: 5px 12px; border-radius: 10px; font-size: 11px; text-transform: uppercase; }
        .brand-box h1 { margin: 0; font-size: 3.2rem; font-weight: 900; letter-spacing: -4px; color: var(--gold); text-align: center; line-height: 1; }
        .card { background: var(--card); border-radius: 28px; width: 100%; max-width: 420px; padding: 1.8rem; box-shadow: 0 25px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; text-align: center; }
        input, select, button { width: 100%; padding: 13px; margin: 6px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: #0f172a; color: white; font-size: 14px; font-weight: 600; }
        button { background: var(--red); border: none; cursor: pointer; }
        .btn-gold { background: var(--gold); color: black; }
        .hidden { display: none !important; }
        #toast { position: fixed; top: 20px; background: var(--gold); color: black; padding: 12px 25px; border-radius: 50px; font-weight: 800; visibility: hidden; z-index: 9999; }
        #toast.show { visibility: visible; animation: pop 0.3s forwards; }
        @keyframes pop { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .student-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 16px; margin-top: 8px; border: 1px solid rgba(255,255,255,0.05); text-align: left; }
    </style>
</head>
<body onload="initApp()">
    <div id="toast">Ready</div>

    <div id="nav-ui" class="top-nav hidden">
        <div style="font-size:10px; color:var(--gold); font-weight:700;">PRO V2.4</div>
        <div class="logout-btn" onclick="logout()">Logout</div>
    </div>

    <div class="brand-box">
        <h1>ATTENDO</h1>
        <p style="color:var(--gold); font-size:10px; margin-top:5px; letter-spacing:2px; font-weight:700;">CREATED BY YUVAN</p>
    </div>

    <div id="auth-card" class="card">
        <input type="text" id="l-email" placeholder="Email Address">
        <input type="password" id="l-pass" placeholder="Password">
        <button onclick="login()">SIGN IN</button>
    </div>

    <div id="main-ui" class="hidden" style="width:100%; max-width:420px;">
        <div class="card">
            <h4 style="color:var(--gold); margin:0;">Add Student</h4>
            <input type="text" id="st-name" placeholder="Full Name">
            <input type="number" id="st-roll" placeholder="Roll Number">
            <div style="display:flex; gap:8px;">
                <select id="add-class">
                    <option>Class 6</option><option>Class 7</option><option>Class 8</option>
                    <option>Class 9</option><option>Class 10</option><option>Class 11</option><option>Class 12</option>
                </select>
                <select id="add-sec"><option>Sec A</option><option>Sec B</option></select>
            </div>
            <button onclick="addStudent()" class="btn-gold">SAVE TO SYSTEM</button>
        </div>

        <div class="card">
            <input type="date" id="att-date" onchange="fetchData()">
            <div style="display:flex; gap:8px;">
                <select id="sel-class" onchange="renderRoster()">
                    <option>Class 6</option><option>Class 7</option><option>Class 8</option>
                    <option>Class 9</option><option>Class 10</option><option>Class 11</option><option>Class 12</option>
                </select>
                <select id="sel-sec" onchange="renderRoster()"><option>Sec A</option><option>Sec B</option></select>
            </div>
            <select id="period-sel" onchange="renderRoster()">
                <option value="1">Period 1</option><option value="2">Period 2</option><option value="3">Period 3</option><option value="4">Period 4</option>
                <option value="5">Period 5</option><option value="6">Period 6</option><option value="7">Period 7</option><option value="8">Period 8</option>
            </select>
            <div id="att-list" style="margin-top:10px;"></div>
            <button onclick="downloadReport()" style="background:#10b981; color:white; margin-top:20px;">DOWNLOAD REPORT (CSV)</button>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbwfQBoRxfC6OydU-TrCzpP1GP0k2WtPX0xXCE7b0HXEAW6kmn11mKIERf0WNPMb5n2xgA/exec";
        let cachedRoster = [], attendanceLogs = [];

        function toast(m) { const t=document.getElementById("toast"); t.innerText=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }

        async function initApp() {
            const u = sessionStorage.getItem('u_email');
            if(!u) return;
            document.getElementById('auth-card').classList.add('hidden');
            document.getElementById('nav-ui').classList.remove('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            document.getElementById('att-date').valueAsDate = new Date();
            fetchData();
        }

        async function login() {
            const e = document.getElementById('l-email').value.toLowerCase().trim();
            const p = document.getElementById('l-pass').value.trim();
            toast("Verifying...");
            const res = await fetch(`${API}?action=login&email=${e}&pass=${p}`);
            const status = await res.text();
            if(status.trim() === "valid") { 
                sessionStorage.setItem('u_email', e); 
                location.reload(); 
            } else { toast("Access Denied"); }
        }

        async function fetchData() {
            try {
                const [r, a] = await Promise.all([
                    fetch(`${API}?action=getRoster`).then(res => res.json()),
                    fetch(`${API}?action=getReport`).then(res => res.json())
                ]);
                cachedRoster = Array.isArray(r) ? r : [];
                attendanceLogs = Array.isArray(a) ? a : [];
                renderRoster();
            } catch(e) { renderRoster(); }
        }

        function renderRoster() {
            const c = document.getElementById('sel-class').value, s = document.getElementById('sel-sec').value;
            const d = document.getElementById('att-date').value, p = document.getElementById('period-sel').value;
            const filtered = cachedRoster.filter(x => x[2] == c && x[3] == s).sort((a,b) => a[1] - b[1]);
            
            document.getElementById('att-list').innerHTML = filtered.map(st => {
                const log = attendanceLogs.find(l => l[0].includes(d) && l[1] == p && l[2] == st[1]);
                return `<div class="student-item">
                    <b>${st[1]}. ${st[0]}</b> ${log ? `<span style="color:var(--gold); font-weight:900;">(${log[6]})</span>`:''}
                    <div style="display:flex; gap:8px;">
                        <button style="background:var(--gold); width:40px; height:40px; border-radius:10px; color:black;" onclick="mark('${st[0]}','${st[1]}','P')">P</button>
                        <button style="background:var(--red); width:40px; height:40px; border-radius:10px;" onclick="mark('${st[0]}','${st[1]}','A')">A</button>
                    </div>
                </div>`;
            }).join('') || "<p style='opacity:0.5; padding:20px;'>No students in this Class & Section.</p>";
        }

        function mark(n, r, s) {
            const d = document.getElementById('att-date').value, p = document.getElementById('period-sel').value;
            const c = document.getElementById('sel-class').value, sec = document.getElementById('sel-sec').value;
            toast(`${n}: ${s}`);
            attendanceLogs.push([d, p, r, n, c, sec, s]); renderRoster();
            fetch(API, {method:"POST", mode:"no-cors", body:JSON.stringify({action:"markAttendance", date:d, name:n, roll:r, status:s, class:c, section:sec, period:p, userEmail:sessionStorage.getItem('u_email')})});
        }

        async function addStudent() {
            const n = document.getElementById('st-name').value, r = document.getElementById('st-roll').value;
            const c = document.getElementById('add-class').value, s = document.getElementById('add-sec').value;
            if(!n || !r) return toast("Enter Details");
            cachedRoster.push([n, r, c, s]); renderRoster();
            await fetch(API, {method:"POST", body:JSON.stringify({action:"addStudent", name:n, roll:r, class:c, section:s})});
            document.getElementById('st-name').value = ""; document.getElementById('st-roll').value = "";
            toast("Added!");
        }

        async function downloadReport() {
            const date = document.getElementById('att-date').value;
            const res = await fetch(`${API}?action=getReport`);
            const data = await res.json();
            let csv = "Roll,Name,Class,Sec,P1,P2,P3,P4,P5,P6,P7,P8\n";
            const dayData = data.filter(row => row[0].includes(date));
            const uniqueRolls = [...new Set(dayData.map(r => r[2]))];
            uniqueRolls.forEach(roll => {
                const s = dayData.find(r => r[2] == roll);
                let row = `${roll},${s[3]},${s[4]},${s[5]}`;
                for(let p=1; p<=8; p++) {
                    const f = dayData.find(r => r[2] == roll && r[1] == p);
                    row += `,${f ? f[6] : '-'}`;
                }
                csv += row + "\n";
            });
            const a = document.createElement('a'); a.href = window.URL.createObjectURL(new Blob([csv], {type:'text/csv'})); a.download = `Report_${date}.csv`; a.click();
        }

        function logout() { sessionStorage.clear(); location.reload(); }
    </script>
</body>
</html>
